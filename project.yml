name: Stakka
options:
  bundleIdPrefix: com.stakka
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  xcodeVersion: "26.0"

targets:
  Stakka:
    type: application
    platform: iOS
    sources:
      - path: Stakka
        excludes:
          - "**/*.xcodeproj"
    info:
      path: Stakka/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleDisplayName: Stakka
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Stakka needs camera access to capture astrophotography images"
        NSPhotoLibraryUsageDescription: "Stakka needs photo library access to stack your images"
        NSLocationWhenInUseUsageDescription: "Stakka needs your location to show light pollution data"
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.stakka.wizard.frameRef
            UTTypeDescription: Stakka Wizard Frame Reference
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.mime-type:
                - application/x-stakka-wizard-frame-ref
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.stakka.app
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
  StakkaTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: Stakka
    sources:
      - StakkaTests
    dependencies:
      - target: Stakka
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stakka.app.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
